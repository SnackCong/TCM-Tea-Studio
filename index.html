<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCM Tea Studio | 中药代茶饮配方管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="login-screen" id="loginScreen">
      <form class="login-panel" id="loginForm">
        <div class="brand login-brand">
          <div class="brand-mark">茶</div>
          <div>
            <h1>TCM Tea Studio</h1>
            <p>登录配方管理系统</p>
          </div>
        </div>
        <label>账号<input id="loginUsername" autocomplete="username" required placeholder="管理员账号" /></label>
        <label>密码<input id="loginPassword" autocomplete="current-password" required type="password" placeholder="管理员密码" /></label>
        <button class="primary-button" type="submit">登录</button>
        <p class="auth-message" id="loginMessage"></p>
      </form>
    </section>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">茶</div>
          <div>
            <h1>TCM Tea Studio</h1>
            <p>代茶饮配方工作台</p>
          </div>
        </div>
        <nav class="nav-tabs" aria-label="主导航">
          <button class="nav-tab active" data-view="dashboard" type="button">总览</button>
          <button class="nav-tab" data-view="clients" type="button">顾客档案</button>
          <button class="nav-tab" data-view="formulas" type="button">配方库</button>
          <button class="nav-tab" data-view="export" type="button">导出配方单</button>
        </nav>
        <div class="side-panel">
          <span class="panel-label">今日待处理</span>
          <strong id="todayCount">0</strong>
          <small>份方案需要复核或交付</small>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">配方管理系统</p>
            <h2 id="viewTitle">总览</h2>
          </div>
          <div class="topbar-actions">
            <span class="user-chip" id="currentUser">未登录</span>
            <button class="ghost-button" id="seedDemo" type="button">载入示例</button>
            <button class="primary-button" id="quickFormula" type="button">新建方案</button>
            <button class="ghost-button" id="logoutButton" type="button">退出</button>
          </div>
        </header>

        <section class="view active" id="dashboardView">
          <div class="metrics-grid">
            <article class="metric-card">
              <span>顾客数</span>
              <strong id="clientMetric">0</strong>
            </article>
            <article class="metric-card">
              <span>方案数</span>
              <strong id="formulaMetric">0</strong>
            </article>
            <article class="metric-card">
              <span>常用体质</span>
              <strong id="dominantMetric">暂无</strong>
            </article>
            <article class="metric-card">
              <span>总茶包</span>
              <strong id="bagsMetric">0</strong>
            </article>
          </div>
          <div class="dashboard-grid">
            <section class="work-section">
              <div class="section-heading">
                <h3>最近方案</h3>
                <button class="text-button" data-go="formulas" type="button">查看全部</button>
              </div>
              <div class="compact-list" id="recentFormulas"></div>
            </section>
            <section class="work-section">
              <div class="section-heading">
                <h3>体质分布</h3>
              </div>
              <div class="constitution-bars" id="constitutionBars"></div>
            </section>
          </div>
        </section>

        <section class="view" id="clientsView">
          <div class="split-layout">
            <form class="editor-panel" id="clientForm">
              <div class="section-heading">
                <h3>顾客档案</h3>
                <button class="ghost-button small" id="resetClient" type="button">清空</button>
              </div>
              <input type="hidden" id="clientId" />
              <label>姓名<input id="clientName" required placeholder="例如：林女士" /></label>
              <div class="two-col">
                <label>性别
                  <select id="clientGender">
                    <option value="">未填写</option>
                    <option value="女">女</option>
                    <option value="男">男</option>
                    <option value="其他">其他</option>
                  </select>
                </label>
                <label>年龄<input id="clientAge" type="number" min="1" max="120" placeholder="例如：36" /></label>
              </div>
              <label>手机号<input id="clientPhone" placeholder="可选" /></label>
              <label>体质分类
                <select id="clientConstitution">
                  <option value="">未分类</option>
                </select>
              </label>
              <label>主诉/调理方向<textarea id="clientConcern" rows="4" placeholder="例如：易疲劳、睡眠浅、口干"></textarea></label>
              <label>禁忌/备注<textarea id="clientNotes" rows="3" placeholder="例如：孕期、过敏、用药情况"></textarea></label>
              <button class="primary-button" type="submit">保存档案</button>
            </form>
            <section class="work-section">
              <div class="section-heading">
                <h3>档案列表</h3>
                <input class="search-input" id="clientSearch" placeholder="搜索姓名、手机号、体质" />
              </div>
              <div class="records-list" id="clientList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="clientDetailView">
          <div class="split-layout formula-layout">
            <section class="work-section">
              <div class="section-heading">
                <h3>客户病例中心</h3>
                <button class="ghost-button small" id="backToClients" type="button">返回列表</button>
              </div>
              <div id="clientDetailPanel"></div>
              <div class="section-heading followup-heading">
                <h3>时间线</h3>
              </div>
              <div class="timeline-list" id="clientTimeline"></div>
              <div class="section-heading followup-heading">
                <h3>历史回访记录</h3>
              </div>
              <div class="records-list" id="sessionList"></div>
              <div class="section-heading followup-heading">
                <h3>历史茶方</h3>
              </div>
              <div class="records-list" id="clientFormulaList"></div>
              <div class="section-heading followup-heading">
                <h3>待办事项</h3>
              </div>
              <div class="records-list" id="clientTodoList"></div>
            </section>
            <div class="stacked-forms">
              <form class="editor-panel" id="sessionForm">
                <div class="section-heading">
                  <h3>新增回访记录</h3>
                </div>
                <label>日期<input id="sessionDate" type="date" required /></label>
                <label>主诉变化<textarea id="sessionComplaintChange" rows="3" placeholder="例如：睡眠改善，疲劳减轻"></textarea></label>
                <div class="two-col">
                  <label>睡眠<input id="sessionSleep" placeholder="例如：入睡较快，夜醒1次" /></label>
                  <label>饮食<input id="sessionDiet" placeholder="例如：食欲正常，少油腻" /></label>
                </div>
                <div class="two-col">
                  <label>大便<input id="sessionStool" placeholder="例如：每日1次，成形" /></label>
                  <label>舌象<input id="sessionTongue" placeholder="例如：舌淡红，苔薄白" /></label>
                </div>
                <label>脉象<input id="sessionPulse" placeholder="例如：脉细" /></label>
                <label>调理建议<textarea id="sessionAdvice" rows="4" placeholder="例如：继续原方案，晚间减少茶饮量"></textarea></label>
                <label>备注<textarea id="sessionNotes" rows="3" placeholder="其他需要记录的事项"></textarea></label>
                <button class="primary-button" type="submit">保存回访记录</button>
              </form>
              <form class="editor-panel" id="clientFormulaForm">
                <div class="section-heading">
                  <h3>新增茶方/调理方案</h3>
                </div>
                <div class="library-callout">
                  <label>从配方库调用<select id="formulaLibrarySelect"></select></label>
                  <button class="ghost-button small" id="applyFormulaLibrary" type="button">调用</button>
                </div>
                <div class="two-col">
                  <label>日期<input id="clientFormulaDate" type="date" required /></label>
                  <label>关联回访<select id="clientFormulaSession"></select></label>
                </div>
                <label>方名<input id="clientFormulaName" required placeholder="例如：健脾安神代茶饮" /></label>
                <label>药味组成<textarea id="clientFormulaHerbs" rows="3" placeholder="例如：茯苓、陈皮、酸枣仁"></textarea></label>
                <label>每味用量<textarea id="clientFormulaDosages" rows="3" placeholder="例如：茯苓3g，陈皮2g，酸枣仁5g"></textarea></label>
                <label>煎服/冲泡方法<textarea id="clientFormulaPreparation" rows="3" placeholder="例如：每日1包，沸水冲泡10分钟"></textarea></label>
                <label>使用周期<input id="clientFormulaPeriod" placeholder="例如：7天" /></label>
                <label>加减说明<textarea id="clientFormulaModifications" rows="3" placeholder="例如：口干明显加麦冬"></textarea></label>
                <label>禁忌/注意事项<textarea id="clientFormulaCautions" rows="3" placeholder="例如：孕期慎用，服药期间咨询医师"></textarea></label>
                <label>备注<textarea id="clientFormulaNotes" rows="3" placeholder="其他需要记录的事项"></textarea></label>
                <button class="primary-button" type="submit">保存茶方</button>
              </form>
              <form class="editor-panel" id="todoForm">
                <div class="section-heading">
                  <h3>新增待办事项</h3>
                </div>
                <input type="hidden" id="todoId" />
                <label>待办内容<input id="todoContent" required placeholder="例如：三天后电话回访睡眠情况" /></label>
                <label>提醒日期<input id="todoReminderDate" type="date" /></label>
                <label>备注<textarea id="todoNotes" rows="3" placeholder="例如：若腹胀未缓解，复核用量"></textarea></label>
                <button class="primary-button" type="submit">保存待办</button>
              </form>
            </div>
          </div>
        </section>

        <section class="view" id="formulasView">
          <div class="split-layout formula-layout">
            <form class="editor-panel" id="formulaForm">
              <div class="section-heading">
                <h3>配方库管理</h3>
                <button class="ghost-button small" id="resetFormula" type="button">清空</button>
              </div>
              <input type="hidden" id="formulaId" />
              <input type="hidden" id="formulaClient" />
              <input type="hidden" id="dailyBags" value="1" />
              <input type="hidden" id="days" value="1" />
              <input type="hidden" id="waterMl" value="350" />
              <input type="hidden" id="formulaStatus" value="待复核" />
              <label>方名<input id="formulaName" required placeholder="例如：健脾祛湿代茶饮" /></label>
              <div class="two-col">
                <label>分类<input id="formulaCategory" placeholder="例如：安神助眠、健脾祛湿" /></label>
                <label>适用证型<input id="formulaPattern" placeholder="例如：心脾两虚、痰湿内阻" /></label>
              </div>
              <label>适用人群<input id="formulaAudience" placeholder="例如：睡眠浅、饭后腹胀、久坐湿重人群" /></label>
              <label>组成<textarea id="formulaComposition" rows="3" placeholder="例如：茯苓、酸枣仁、陈皮"></textarea></label>
              <label>默认剂量<textarea id="formulaDefaultDosage" rows="3" placeholder="例如：茯苓3g，酸枣仁5g，陈皮2g"></textarea></label>
              <label>用法<textarea id="usage" rows="3">每日代茶温饮，饭后或两餐间饮用。</textarea></label>
              <label>加减规则<textarea id="formulaModifications" rows="3" placeholder="例如：口干明显加麦冬；腹胀明显减滋腻药味"></textarea></label>
              <label>注意事项<textarea id="cautions" rows="3" placeholder="根据顾客情况填写禁忌、停用条件等"></textarea></label>
              <div class="two-col">
                <label>口感备注<textarea id="formulaTasteNotes" rows="3" placeholder="例如：微酸、偏淡，可少量加陈皮调味"></textarea></label>
                <label>成本备注<textarea id="formulaCostNotes" rows="3" placeholder="例如：酸枣仁成本较高，可复核库存"></textarea></label>
              </div>
              <label>备注<textarea id="formulaNotes" rows="3" placeholder="内部管理备注"></textarea></label>

              <div class="ingredient-header" hidden>
                <h4>药食同源/中药材</h4>
                <button class="ghost-button small" id="addIngredient" type="button">添加</button>
              </div>
              <div id="ingredients" hidden></div>
              <div class="calc-strip" hidden>
                <span>单包 <strong id="singleWeight">0g</strong></span>
                <span>总包数 <strong id="totalBags">0</strong></span>
                <span>总克重 <strong id="totalWeight">0g</strong></span>
              </div>
              <button class="primary-button" type="submit">保存配方</button>
            </form>
            <section class="work-section">
              <div class="section-heading">
                <h3>配方列表</h3>
                <input class="search-input" id="formulaSearch" placeholder="搜索方名、分类、证型、人群、组成" />
              </div>
              <div class="records-list" id="formulaList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="exportView">
          <div class="export-layout">
            <section class="work-section">
              <div class="section-heading">
                <h3>选择配方单</h3>
                <select id="exportFormula"></select>
              </div>
              <div class="export-actions">
                <button class="primary-button" id="printFormula" type="button">打印 / 另存 PDF</button>
                <button class="ghost-button" id="copyFormula" type="button">复制文本</button>
              </div>
              <p class="fine-print">建议正式交付前由执业中医师或合规负责人复核。系统仅用于门店配方管理，不替代诊疗。</p>
            </section>
            <article class="formula-sheet" id="formulaSheet"></article>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js?v=20260603-auth-init"></script>
  </body>
</html>
